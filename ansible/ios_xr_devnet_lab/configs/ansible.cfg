[defaults]
inventory = devnet.yml
host_key_checking = False
retry_files_enabled = False
timeout = 30
stdout_callback = ansible.builtin.default
result_format = yaml
interpreter_python = auto_silent
collections_path = ~/.ansible/collections:/usr/share/ansible/collections
deprecation_warnings = False

[persistent_connection]
connect_timeout = 60
command_timeout = 60

[paramiko_connection]
look_for_keys = False
host_key_checking = False

[ssh_connection]
ssh_args = -o PreferredAuthentications=keyboard-interactive,password -o PubkeyAuthentication=no -o StrictHostKeyChecking=no
