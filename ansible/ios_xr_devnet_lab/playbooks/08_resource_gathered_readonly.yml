---
- name: Gather interface state as structured data
  hosts: all
  gather_facts: false

  tasks:
    - name: Gather IOS XR interface resource state
      cisco.iosxr.iosxr_interfaces:
        state: gathered
      register: gathered_interfaces

    - name: Save gathered interface data as JSON
      ansible.builtin.copy:
        content: "{{ gathered_interfaces.gathered | to_nice_json }}\n"
        dest: "{{ playbook_dir }}/../outputs/{{ inventory_hostname }}_interfaces_gathered.json"
      delegate_to: localhost

    - name: Print first few gathered interface records
      ansible.builtin.debug:
        msg: "{{ gathered_interfaces.gathered[:5] }}"
